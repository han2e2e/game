  <script>
  (function () {
    'use strict';

    /*
      Supabase에서 아래 SQL을 실행해서 테이블을 만들 것:

      create table rankings (
        id bigint generated always as identity primary key,
        nickname text not null,
        count int not null default 0,
        combo int not null default 0,
        created_at timestamptz default now()
      );

      alter table rankings enable row level security;

      create policy "누구나 읽기 가능"
        on rankings for select using (true);

      create policy "누구나 삽입 가능"
        on rankings for insert with check (true);
    */

    const SUPABASE_URL = 'https://hneozwrttqvurhexpofe.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_H_EKJPrWsxEtnq6CMbrEPg_CX0YPXnM';

    let supabase = null;
    function initSupabase() {
      if (supabase) return supabase;
      if (!window.supabase) return null;
      if (!SUPABASE_URL.includes('supabase.co') || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith('YOUR_')) {
        return null;
      }
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } catch (err) {
        console.warn('Supabase init failed:', err);
      }
      return supabase;
    }

    let scoreSubmitted = false;
    let currentCount = 0;
    let myRankingRecord = null;
    const RANKING_PAGE_SIZE = 10;
    const RANKING_MAX = 50;
    let rankingPage = 1;
    let rankingDataCache = [];

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gameStageEl = document.getElementById('game-stage');
    const rotateOverlayEl = document.getElementById('rotate-overlay');
    const hudParryHintEl = document.getElementById('hud-parry-hint');
    const hpBlocksEl = document.getElementById('hp-blocks');
    const staminaBlocksEl = document.getElementById('stamina-blocks');
    const staminaWrap = document.getElementById('stamina-wrap');
    const cutCountEl = document.getElementById('cut-count');
    const flashOverlay = document.getElementById('flash-overlay');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const btnRetry = document.getElementById('btn-retry');
    const btnGotoRank = document.getElementById('btn-goto-rank');
    const btnHome = document.getElementById('btn-home');
    const mainMenuEl = document.getElementById('main-menu');
    const uiOverlayEl = document.getElementById('ui-overlay');
    const btnStart = document.getElementById('btn-start');
    const btnRank = document.getElementById('btn-rank');
    const rankingScreenEl = document.getElementById('ranking-screen');
    const nicknameInput = document.getElementById('nickname-input');
    const btnSubmitScore = document.getElementById('btn-submit-score');
    const btnRankingBack = document.getElementById('btn-ranking-back');
    const rankingPaginationEl = document.getElementById('ranking-pagination');

    const GameState = {
      MAIN_MENU: 'MAIN_MENU',
      PLAYING: 'PLAYING'
    };

    const PARRY_RADIUS = 130;
    const REF_W = 1600;
    const REF_H = 900;
    const PLAYER_FOOT_OFFSET = 90;
    const PARRY_WINDOW = 0.14;
    const PARRY_WINDOW_MOBILE = 0.18;
    const DIFFICULTY_MAX = 5;
    const ARROW_TRAVEL_MIN = 0.42;
    const ARROW_TRAVEL_MAX = 0.68;
    const ARROW_TRAVEL_FAST_MAX = 0.48;
    const COUNT_FAST_THRESHOLD = 40;
    const COMBO_SOFT_CAP = 40;
    const PLAYER_HIT_RADIUS = 14;
    const GUIDE_SHOW_TIME = 3;
    const ATTACKS_START_TIME = GUIDE_SHOW_TIME;
    const MAX_HP = 2;
    const HIT_DAMAGE = 1;
    const MAX_STAMINA = 3;
    const STAMINA_REGEN_INTERVAL = 3;
    const STAMINA_REGEN_AMOUNT = 1;
    const STAMINA_SWING_COST = 1;

    let W, H, cx, cy;
    let gameScale = 1;
    let gameState = GameState.MAIN_MENU;
    let running = false;
    let gameOver = false;
    let hp = MAX_HP;
    let stamina = MAX_STAMINA;
    let staminaRegenTimer = 0;
    let combo = 0;
    let maxCombo = 0;
    let cutCount = 0;
    let parryActive = false;
    let parryTimer = 0;
    let screenFlash = 0;
    let spawnTimer = 0;
    let spawnInterval = 2;
    let difficulty = 1;
    let lastTime = 0;
    let gameTime = 0;
    let comboPop = 0;

    let charState = 'idle';
    let charTimer = 0;
    let charShakeTimer = 0;

    const UI_LABEL_TRACK = 4;
    const COMBO_DIGIT_GAP_RATIO = 0.085;
    const COMBO_MULTI_SCALE = { 2: 0.92, 3: 0.84, 4: 0.76 };
    const COMBO_STACK_GAP_MIN = 10;
    const COMBO_STACK_GAP_RATIO = 0.075;
    const COMBO_POP_DURATION = 0.38;
    const COMBO_SIZE_SCALE = 0.7;
    const COMBO_SCREEN_CENTER_Y_RATIO = 0.34;
    const COMBO_COLOR = '#111';
    const INK_PAD_RATIO = 0.018;

    const attacks = [];
    const particles = [];
    const brokenSticks = [];
    const slashes = [];

    const SLASH_VISUAL = {
      down:   { angle: Math.PI * 0.5,  len: 0.85 },
      diag_L: { angle: Math.PI * 0.75, len: 0.9  },
      diag_R: { angle: Math.PI * 0.25, len: 0.9  },
      horiz:  { angle: 0,              len: 0.95 }
    };

    const player = { x: 0, y: 0 };

    const COMBAT_CENTER_Y_RATIO = 0.38;

    function s(value) {
      return value * gameScale;
    }

    function getParryRadius() {
      return s(PARRY_RADIUS);
    }

    function getCharHeight() {
      const hitboxH = Math.round(getParryRadius() / (1 - COMBAT_CENTER_Y_RATIO));
      return Math.min(Math.round(hitboxH * 1.28), H * 0.38);
    }

    function getCharHeadTopY(rect) {
      const ratio = rect.img && rect.img.headTopRatio != null ? rect.img.headTopRatio : 0.12;
      return rect.y + rect.h * ratio;
    }

    function computeHeadTopRatio(img) {
      return new Promise((resolve) => {
        try {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          if (!w || !h) {
            resolve(0.12);
            return;
          }
          const c = document.createElement('canvas');
          c.width = w;
          c.height = h;
          const cx = c.getContext('2d');
          cx.drawImage(img, 0, 0);
          const { data } = cx.getImageData(0, 0, w, h);
          let minY = h;
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const i = (y * w + x) * 4;
              if (data[i + 3] < 20) continue;
              const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
              const spread = Math.max(data[i], data[i + 1], data[i + 2]) - Math.min(data[i], data[i + 1], data[i + 2]);
              if (lum < 220 || spread >= 30) {
                minY = Math.min(minY, y);
                break;
              }
            }
          }
          resolve(minY < h ? minY / h : 0.12);
        } catch (err) {
          resolve(0.12);
        }
      });
    }

    function getBodyHitRadius() {
      return s(PLAYER_HIT_RADIUS);
    }

    function getComboAnchor() {
      return {
        x: W * 0.5,
        stackCenterY: H * COMBO_SCREEN_CENTER_Y_RATIO
      };
    }

    function attachPresetCenter(ink, preset) {
      if (preset && preset.cx != null) ink.cx = preset.cx;
      return ink;
    }

    function getCombatCenter() {
      const h = getCharHeight();
      const shakeX = charShakeTimer > 0 ? Math.sin(charShakeTimer * 38) * s(5) : 0;
      return {
        x: player.x + shakeX,
        y: player.y - h * COMBAT_CENTER_Y_RATIO,
        shakeX
      };
    }

    function getFirstAvailableCharImg() {
      return charImgs.idle || charImgs.draw || charImgs.horiz
        || charImgs.diag_L || charImgs.diag_R || charImgs.up || charImgs.down_pre || charImgs.down || null;
    }

    function getCurrentCharImg() {
      let img;
      switch (charState) {
        case 'draw':   img = charImgs.draw; break;
        case 'slash':
          if (charPattern === 'down')   img = charImgs.up;
          else if (charPattern === 'diag_L') img = charImgs.diag_L;
          else if (charPattern === 'diag_R') img = charImgs.diag_R;
          else img = charImgs.horiz;
          break;
        case 'impact':
          if (charPattern === 'down')   img = charImgs.down;
          else if (charPattern === 'diag_L') img = charImgs.diag_L;
          else if (charPattern === 'diag_R') img = charImgs.diag_R;
          else img = charImgs.horiz;
          break;
        case 'hit':
        case 'return':
          img = charImgs.idle;
          break;
        default:
          img = charImgs.idle;
      }
      return img || getFirstAvailableCharImg();
    }

    function drawPlayerFallbackDot() {
      const cc = getCombatCenter();
      ctx.save();
      ctx.translate(cc.x, cc.y);
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(0, 0, getBodyHitRadius() * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function getCharDrawRect() {
      const img = getCurrentCharImg();
      const h = getCharHeight();
      const srcW = img && (img.naturalWidth || img.width);
      const srcH = img && (img.naturalHeight || img.height);
      const w = srcW && srcH ? (srcW / srcH) * h : h * 0.55;
      const c = getCombatCenter();
      return { x: c.x - w * 0.5, y: player.y - h, w, h, img };
    }

    function isCoarseMobile() {
      return window.matchMedia('(pointer: coarse)').matches

    }

    function isPortraitViewport() {
      const { w, h } = getViewportSize();
      return h > w;
    }

    function getParryWindow() {

    function tryLockLandscape() {

      }

    function getViewportSize() {
      const vv = window.visualViewport;
      return {
        w: Math.round(vv ? vv.width : window.innerWidth),
        h: Math.round(vv ? vv.height : window.innerHeight)
      };
    }

    function resize() {
      updateOrientationOverlay();
      updateParryHint();

      const { w: vw, h: vh } = getViewportSize();
      const scale = Math.min(vw / REF_W, vh / REF_H);
      const displayW = Math.max(1, Math.round(REF_W * scale));
      const displayH = Math.max(1, Math.round(REF_H * scale));

      W = REF_W;
      H = REF_H;
      gameScale = 1;

      canvas.height = REF_H;

        gameStageEl.style.width = displayW + 'px';
        gameStageEl.style.height = displayH + 'px';
      }

      cy = H - s(PLAYER_FOOT_OFFSET);
      player.x = cx;
      player.y = cy;
    }

    function setGameState(state) {
      gameState = state;
      mainMenuEl.classList.toggle('hidden', state !== GameState.MAIN_MENU);
      uiOverlayEl.classList.toggle('hidden', state !== GameState.PLAYING);
      canvas.style.cursor = state === GameState.PLAYING ? 'crosshair' : 'default';
    }

    function startGame() {
      tryLockLandscape();
      setGameState(GameState.PLAYING);
      resetGame();
      lastTime = performance.now();
    }

    function isKnockoutPixel(r, g, b, a, threshold) {
      if (a <= 8) return true;
      const spread = Math.max(r, g, b) - Math.min(r, g, b);
      if (spread >= 42) return false;
      return (r + g + b) / 3 >= threshold;
    }

    function applyWhiteKnockout(data, whiteThreshold = 235) {
      for (let i = 0; i < data.length; i += 4) {
        if (isKnockoutPixel(data[i], data[i + 1], data[i + 2], data[i + 3], whiteThreshold)) {
          data[i + 3] = 0;
        }
      }
    }

    function floodRemoveBackground(data, w, h, threshold) {
      const visited = new Uint8Array(w * h);
      const stack = [];
      function tryPush(x, y) {
        if (x < 0 || y < 0 || x >= w || y >= h) return;
        const idx = y * w + x;
        if (visited[idx]) return;
        const i = idx * 4;
        if (!isKnockoutPixel(data[i], data[i + 1], data[i + 2], data[i + 3], threshold)) return;
        visited[idx] = 1;
        stack.push(x, y);
      }
      for (let x = 0; x < w; x++) {
        tryPush(x, 0);
        tryPush(x, h - 1);
      }
      for (let y = 0; y < h; y++) {
        tryPush(0, y);
        tryPush(w - 1, y);
      }
      while (stack.length) {
        const x = stack.pop();
        const y = stack.pop();
        const i = (y * w + x) * 4;
        data[i + 3] = 0;
        tryPush(x + 1, y);
        tryPush(x - 1, y);
        tryPush(x, y + 1);
        tryPush(x, y - 1);
      }
    }

    function stripNearWhitePixels(data, lumThreshold = 215) {
      for (let i = 0; i < data.length; i += 4) {
        if (data[i + 3] <= 8) continue;
        const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
        if (lum >= lumThreshold) data[i + 3] = 0;
      }
    }

    function getInkPad(srcW, srcH) {
      return Math.max(8, Math.round(Math.max(srcW, srcH) * INK_PAD_RATIO));
    }

    function padInkRect(ink, srcW, srcH, extraPad) {
      const pad = extraPad != null ? extraPad : getInkPad(srcW, srcH);
      const sx = Math.max(0, ink.sx - pad);
      const sy = Math.max(0, ink.sy - pad);
      const sw = Math.min(srcW - sx, ink.sw + pad * 2);
      const sh = Math.min(srcH - sy, ink.sh + pad * 2);
      return { sx, sy, sw, sh, srcW, srcH };
    }

    function getInkBounds(data, w, h, pad, lumMax = 215) {
      let minX = w;
      let minY = h;
      let maxX = -1;
      let maxY = -1;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          if (data[i + 3] <= 12) continue;
          const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
          if (lum >= lumMax) continue;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }
      if (maxX < minX) return null;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(w - 1, maxX + pad);
      maxY = Math.min(h - 1, maxY + pad);
      return { minX, minY, tw: maxX - minX + 1, th: maxY - minY + 1 };
    }

    function cropOpaqueBounds(data, w, h, pad) {
      return getInkBounds(data, w, h, pad, 255);
    }

    function applyInkRect(img, bounds, srcW, srcH, cropped) {
      if (!img || !bounds) return img;
      const raw = cropped
        ? { sx: 0, sy: 0, sw: bounds.tw, sh: bounds.th }
        : { sx: bounds.minX, sy: bounds.minY, sw: bounds.tw, sh: bounds.th };
      img.inkRect = padInkRect(raw, cropped ? bounds.tw : srcW, cropped ? bounds.th : srcH);
      return img;
    }

    function getInkRect(img, sheetFallback) {
      if (img && img.inkRect) return img.inkRect;
      const srcW = img.naturalWidth || img.width || 1;
      const srcH = img.naturalHeight || img.height || 1;
      if (sheetFallback && sheetFallback.srcW === srcW && sheetFallback.srcH === srcH) {
        return attachPresetCenter(padInkRect(sheetFallback, srcW, srcH), sheetFallback);
      }
      return { sx: 0, sy: 0, sw: srcW, sh: srcH, srcW, srcH };
    }

    function drawInkImageSrc(img, ink, dx, dy, dw, dh) {
      if (!img || !ink) return;
      ctx.drawImage(img, ink.sx, ink.sy, ink.sw, ink.sh, dx, dy, dw, dh);
    }

    function drawInkImage(img, x, y, w, h) {
      drawInkImageSrc(img, getInkRect(img, null), x, y, w, h);
    }

    function canvasToImage(canvas) {
      return new Promise((resolve) => {
        const out = new Image();
        out.onload = () => resolve(out);
        out.onerror = () => resolve(null);
        out.src = canvas.toDataURL('image/png');
      });
    }

    function processInkImageAsync(img, threshold = 210) {
      return new Promise((resolve) => {
        try {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          if (!w || !h) {
            resolve(img);
            return;
          }

          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const frame = ctx.getImageData(0, 0, w, h);

          const cropPad = getInkPad(w, h);

          floodRemoveBackground(frame.data, w, h, threshold);
          applyWhiteKnockout(frame.data, threshold);
          stripNearWhitePixels(frame.data, threshold + 8);

          let bounds = getInkBounds(frame.data, w, h, cropPad, threshold + 8);
          if (!bounds) {
            applyWhiteKnockout(frame.data, 198);
            stripNearWhitePixels(frame.data, 205);
            bounds = getInkBounds(frame.data, w, h, cropPad, 210);
          }
          if (!bounds) {
            ctx.drawImage(img, 0, 0);
            const raw = ctx.getImageData(0, 0, w, h);
            bounds = getInkBounds(raw.data, w, h, cropPad, 215);
            if (bounds) {
              applyInkRect(img, bounds, w, h, false);
              resolve(img);
              return;
            }
            resolve(img);
            return;
          }

          ctx.putImageData(frame, 0, 0);

          const out = document.createElement('canvas');
          out.width = bounds.tw;
          out.height = bounds.th;
          out.getContext('2d').drawImage(
            canvas,
            bounds.minX, bounds.minY, bounds.tw, bounds.th,
            0, 0, bounds.tw, bounds.th
          );

          canvasToImage(out).then((processed) => {
            const finalImg = processed || img;
            applyInkRect(finalImg, bounds, w, h, !!processed);
            resolve(finalImg);
          });
        } catch (err) {
          resolve(img);
        }
      });
    }

    function getEffectiveDifficulty() {
      return Math.min(difficulty, DIFFICULTY_MAX);
    }

    function getComboDiffBonus() {
      if (combo >= COMBO_SOFT_CAP) return 0.015;
      if (combo >= 10) return 0.05;
      if (combo >= 5) return 0.035;
      return 0.025;
    }

    function scheduleNextSpawn() {
      const d = getEffectiveDifficulty();
      const minGap = Math.max(0.65, 1.05 - d * 0.045);
      const maxGap = 4.5;
      spawnInterval = minGap + Math.random() * (maxGap - minGap);
    }

    function showGameOverPanel() {
      finalScoreEl.textContent = '카운트 : ' + cutCount + '개\u00A0\u00A0최대콤보 : ' + maxCombo + '개';
      gameOverEl.classList.add('show');
    }

    function hideGameOverPanel() {
      gameOverEl.classList.remove('show');
    }

    function getRankLabel(rank) {
      if (rank === 1) return { rankClass: 'rank-cell rank-1', rankLabel: '1' };
      if (rank === 2) return { rankClass: 'rank-cell rank-2', rankLabel: '2' };
      if (rank === 3) return { rankClass: 'rank-cell rank-3', rankLabel: '3' };
      return { rankClass: 'rank-cell rank-num', rankLabel: String(rank) };
    }

    function applyRankCellStyle(cell, rank) {
      if (rank === '-' || rank == null || rank === '') {
        cell.className = 'rank-cell rank-num';
        cell.textContent = '-';
        return;
      }
      const num = Number(rank);
      if (!Number.isFinite(num) || num < 1) {
        cell.className = 'rank-cell rank-num';
        cell.textContent = String(rank);
        return;
      }
      const { rankClass, rankLabel } = getRankLabel(num);
      cell.className = rankClass;
      cell.textContent = rankLabel;
    }

    function renderRankingRow(row, rank) {
      const { rankClass, rankLabel } = getRankLabel(rank);
      return `
      <tr>
        <td class="${rankClass}">${rankLabel}</td>
        <td>${escapeHtml(row.nickname)}</td>
        <td>${row.count}</td>
        <td>${row.combo}</td>
        <td class="ranking-action-empty"></td>
      </tr>`;
    }

    async function getProjectedRank(client, count, combo) {
      const { count: ahead, error } = await client
        .from('rankings')
        .select('*', { count: 'exact', head: true })
        .or([
          `count.gt.${count}`,
          `and(count.eq.${count},combo.gt.${combo})`
        ].join(','));

      if (error) return null;
      return (ahead ?? 0) + 1;
    }

    async function getRankForRecord(client, record) {
      const { count, error } = await client
        .from('rankings')
        .select('*', { count: 'exact', head: true })
        .or([
          `count.gt.${record.count}`,
          `and(count.eq.${record.count},combo.gt.${record.combo})`,
          `and(count.eq.${record.count},combo.eq.${record.combo},id.lt.${record.id})`
        ].join(','));

      if (error) return null;
      return (count ?? 0) + 1;
    }

    async function updateRankingSubmitRow(client, allRankings) {
      const rankCell = document.getElementById('my-rank-cell');
      const countCell = document.getElementById('my-count-cell');
      const comboCell = document.getElementById('my-combo-cell');

      let displayRank = '-';
      let displayCount = currentCount;
      let displayCombo = maxCombo;

      if (myRankingRecord && client) {
        displayCount = myRankingRecord.count;
        displayCombo = myRankingRecord.combo;
        nicknameInput.value = myRankingRecord.nickname;

        const listIndex = allRankings ? allRankings.findIndex((row) => row.id === myRankingRecord.id) : -1;
        if (listIndex >= 0) {
          displayRank = listIndex + 1;
        } else {
          displayRank = await getRankForRecord(client, myRankingRecord) ?? '-';
        }
      } else if (client && (currentCount > 0 || maxCombo > 0)) {
        displayRank = await getProjectedRank(client, currentCount, maxCombo) ?? '-';
      }

      countCell.textContent = displayCount;
      comboCell.textContent = displayCombo;
      applyRankCellStyle(rankCell, displayRank);
    }

    function getRankingTotalPages(len) {
      if (len <= 0) return 0;
      return Math.min(RANKING_MAX / RANKING_PAGE_SIZE, Math.ceil(len / RANKING_PAGE_SIZE));
    }

    function renderRankingTablePage() {
      const tbody = document.getElementById('ranking-body');
      const start = (rankingPage - 1) * RANKING_PAGE_SIZE;
      const slice = rankingDataCache.slice(start, start + RANKING_PAGE_SIZE);
      tbody.innerHTML = slice.map((row, i) => renderRankingRow(row, start + i + 1)).join('');
    }

    function renderRankingPagination() {
      const totalPages = getRankingTotalPages(rankingDataCache.length);
      if (totalPages <= 1) {
        rankingPaginationEl.innerHTML = '';
        return;
      }
      if (rankingPage > totalPages) rankingPage = totalPages;
      rankingPaginationEl.innerHTML = Array.from({ length: totalPages }, (_, i) => {
        const page = i + 1;
        const active = page === rankingPage ? ' is-active' : '';
        return `<button type="button" class="ranking-page-btn${active}" data-page="${page}">${page}</button>`;
      }).join('');
    }

    async function loadRankings() {
      const tbody = document.getElementById('ranking-body');
      tbody.innerHTML = '<tr><td colspan="5" class="ranking-loading">불러오는 중...</td></tr>';
      rankingPaginationEl.innerHTML = '';

      const client = initSupabase();
      if (!client) {
        tbody.innerHTML = '<tr><td colspan="5" class="ranking-loading">Supabase 연결 실패 — URL/KEY 확인</td></tr>';
        rankingDataCache = [];
        await updateRankingSubmitRow(null, null);
        return;
      }

      const { data, error } = await client
        .from('rankings')
        .select('id, nickname, count, combo')
        .order('count', { ascending: false })
        .order('combo', { ascending: false })
        .order('id', { ascending: true })
        .limit(RANKING_MAX);

      if (error || !data) {
        tbody.innerHTML = '<tr><td colspan="5" class="ranking-loading">불러오기 실패</td></tr>';
        rankingDataCache = [];
        await updateRankingSubmitRow(client, null);
        return;
      }

      rankingDataCache = data;

      if (rankingDataCache.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="ranking-loading">아직 기록이 없습니다</td></tr>';
      } else {
        const totalPages = getRankingTotalPages(rankingDataCache.length);
        if (rankingPage > totalPages) rankingPage = totalPages;
        renderRankingTablePage();
        renderRankingPagination();
      }

      await updateRankingSubmitRow(client, rankingDataCache);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function submitScore(nickname) {
      const btn = document.getElementById('btn-submit-score');
      const client = initSupabase();
      if (!client) {
        alert('Supabase 연결 실패. URL/KEY를 확인해주세요.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '등록 중...';

      const { data, error } = await client
        .from('rankings')
        .insert([{
          nickname: nickname.trim(),
          count: currentCount,
          combo: maxCombo
        }])
        .select('id, nickname, count, combo')
        .single();

      if (error || !data) {
        btn.disabled = false;
        btn.textContent = '등록하기';
        alert('등록 실패. 다시 시도해주세요.');
        return;
      }

      myRankingRecord = data;
      scoreSubmitted = true;
      nicknameInput.disabled = true;
      btnSubmitScore.disabled = true;
      btn.textContent = '등록 완료 ✓';
      await loadRankings();
      const myIndex = rankingDataCache.findIndex((row) => row.id === myRankingRecord.id);
      if (myIndex >= 0) {
        rankingPage = Math.floor(myIndex / RANKING_PAGE_SIZE) + 1;
        renderRankingTablePage();
        renderRankingPagination();
      }
    }

    function showRankingScreen() {
      rankingScreenEl.classList.remove('hidden');
      mainMenuEl.classList.add('hidden');
      rankingPage = 1;
      nicknameInput.disabled = scoreSubmitted;
      btnSubmitScore.disabled = scoreSubmitted;
      btnSubmitScore.textContent = scoreSubmitted ? '등록 완료 ✓' : '등록하기';
      if (!scoreSubmitted) nicknameInput.value = '';
      loadRankings();
    }

    function hideRankingScreen() {
      rankingScreenEl.classList.add('hidden');
      if (gameState === GameState.MAIN_MENU) {
        mainMenuEl.classList.remove('hidden');
      }
    }

    function resetGame() {
      hp = MAX_HP;
      stamina = MAX_STAMINA;
      staminaRegenTimer = 0;
      combo = 0;
      maxCombo = 0;
      cutCount = 0;
      currentCount = 0;
      scoreSubmitted = false;
      myRankingRecord = null;
      parryActive = false;
      parryTimer = 0;
      screenFlash = 0;
      spawnTimer = 0;
      scheduleNextSpawn();
      difficulty = 1;
      gameTime = 0;
      comboPop = 0;
      gameOver = false;
      attacks.length = 0;
      particles.length = 0;
      brokenSticks.length = 0;
      slashes.length = 0;
      charState = 'idle';
      charTimer = 0;
      charShakeTimer = 0;
      charReturnTimer = 0;
      updateHUD();
      hideGameOverPanel();
    }

    function updateHUD() {
      hpBlocksEl.querySelectorAll('.hud-block').forEach((block, i) => {
        block.classList.toggle('empty', i >= hp);
      });
      staminaBlocksEl.querySelectorAll('.hud-block').forEach((block, i) => {
        block.classList.toggle('empty', i >= stamina);
      });
      staminaWrap.classList.toggle('empty', stamina < STAMINA_SWING_COST);
      cutCountEl.textContent = String(cutCount);
    }

    function bumpComboVisual() {
      comboPop = 1;
    }

    function getComboPopScale() {
      if (comboPop <= 0) return 1;
      const t = 1 - comboPop;
      return 1 + Math.sin(t * Math.PI) * 0.28;
    }

    function getComboDigitGap(count, digitH) {
      if (count <= 1) return 0;
      return Math.max(8, digitH * COMBO_DIGIT_GAP_RATIO);
    }

    function setUiFont(ctx, sizePx, weight) {
      ctx.font = (weight || 400) + ' ' + sizePx + 'px ' + UI_FONT;
      ctx.fillStyle = '#111';
      ctx.textBaseline = 'alphabetic';
    }

    function measureTrackedText(ctx, text, sizePx, trackingPx) {
      setUiFont(ctx, sizePx);
      if (!text) return { width: 0, height: sizePx };
      if (!trackingPx || text.length <= 1) {
        return { width: ctx.measureText(text).width, height: sizePx };
      }
      let width = 0;
      for (let i = 0; i < text.length; i++) {
        width += ctx.measureText(text[i]).width;
        if (i < text.length - 1) width += trackingPx;
      }
      return { width, height: sizePx };
    }

    function measureDigitRow(ctx, digits, sizePx, gap) {
      setUiFont(ctx, sizePx);
      if (digits.length <= 1) {
        return ctx.measureText(digits).width;
      }
      let width = 0;
      for (let i = 0; i < digits.length; i++) {
        width += ctx.measureText(digits[i]).width;
        if (i < digits.length - 1) width += gap;
      }
      return width;
    }

    function drawDigitRow(ctx, digits, leftX, baselineY, sizePx, gap, fillColor) {
      setUiFont(ctx, sizePx);
      if (fillColor) ctx.fillStyle = fillColor;
      let x = leftX;
      for (let i = 0; i < digits.length; i++) {
        ctx.fillText(digits[i], x, baselineY);
        x += ctx.measureText(digits[i]).width + (i < digits.length - 1 ? gap : 0);
      }
    }

    function drawTrackedText(ctx, text, centerX, baselineY, sizePx, trackingPx, fillColor) {
      const metrics = measureTrackedText(ctx, text, sizePx, trackingPx);
      let x = centerX - metrics.width * 0.5;
      setUiFont(ctx, sizePx);
      if (fillColor) ctx.fillStyle = fillColor;
      for (let i = 0; i < text.length; i++) {
        ctx.fillText(text[i], x, baselineY);
        x += ctx.measureText(text[i]).width + (i < text.length - 1 ? trackingPx : 0);
      }
      return metrics;
    }

    function drawCombo() {
      if (combo <= 0) return;

      const digits = String(combo);
      const pop = getComboPopScale();
      const anchor = getComboAnchor();
      const centerX = anchor.x;
      let digitH = Math.min(W * 0.30, H * 0.32) * COMBO_SIZE_SCALE;
      if (digits.length >= 2) {
        digitH *= COMBO_MULTI_SCALE[Math.min(digits.length, 4)] || COMBO_MULTI_SCALE[4];
      }

      let digitFontSize = digitH * 0.78;
      let digitGap = getComboDigitGap(digits.length, digitH);
      let totalDigitW = measureDigitRow(ctx, digits, digitFontSize, digitGap);

      const maxRowW = W * (digits.length >= 3 ? 0.88 : 0.92);
      if (totalDigitW > maxRowW) {
        const shrink = maxRowW / totalDigitW;
        digitFontSize *= shrink;
        digitH *= shrink;
        digitGap = getComboDigitGap(digits.length, digitH);
        totalDigitW = measureDigitRow(ctx, digits, digitFontSize, digitGap);
      }

      let labelFontSize = Math.max(UI_LABEL_PX, digitH * 0.22);
      const labelTracking = UI_LABEL_TRACK * (labelFontSize / UI_LABEL_PX);
      let labelMetrics = measureTrackedText(ctx, 'COMBO', labelFontSize, labelTracking);
      if (labelMetrics.width < totalDigitW * 0.82) {
        labelFontSize = labelFontSize * (totalDigitW * 0.82 / labelMetrics.width);
        labelMetrics = measureTrackedText(ctx, 'COMBO', labelFontSize, UI_LABEL_TRACK * (labelFontSize / UI_LABEL_PX));
      }

      const stackGap = Math.max(COMBO_STACK_GAP_MIN, digitH * COMBO_STACK_GAP_RATIO);
      const labelH = labelFontSize * 1.15;
      const blockH = digitH + stackGap + labelH;
      const blockCenterY = anchor.stackCenterY;
      const stackBottomY = blockCenterY + blockH * 0.5;
      const comboBaseline = stackBottomY - labelFontSize * 0.12;
      const digitBaseline = stackBottomY - labelH - stackGap - digitFontSize * 0.12;

      ctx.save();
      ctx.translate(centerX, blockCenterY);
      ctx.scale(pop, pop);
      ctx.translate(-centerX, -blockCenterY);

      drawDigitRow(ctx, digits, centerX - totalDigitW * 0.5, digitBaseline, digitFontSize, digitGap, COMBO_COLOR);
      drawTrackedText(ctx, 'COMBO', centerX, comboBaseline, labelFontSize, UI_LABEL_TRACK * (labelFontSize / UI_LABEL_PX), COMBO_COLOR);
      ctx.restore();
    }

    function loadCharImages() {
      const map = {
        idle:     '캐릭터3(준비자세).png',
        draw:     '캐릭터2(좌측검뺀자세).png',
        diag_L:   '캐릭터4(좌측상단우측하단).png',
        diag_R:   '캐릭터5(우측상단좌측하단).png',
        horiz:    '캐릭터1(올려베기).png',
        up:       '캐릭터8(위로베기).png',
        down_pre: '캐릭터6(아래꽂기).png',
        down:     '캐릭터7(아래베기).png'
      };
      let pending = Object.keys(map).length;
      const onDone = () => { if (--pending <= 0) charImgs.loaded = true; };
      for (const [key, src] of Object.entries(map)) {
        const img = new Image();
        img.onload = () => {
          computeHeadTopRatio(img)
            .then((ratio) => {
              img.headTopRatio = ratio;
              charImgs[key] = img;
            })
            .catch(() => { charImgs[key] = img; })
            .finally(onDone);
        };
        img.onerror = () => { charImgs[key] = null; onDone(); };
        img.src = src;
      }
    }

    function triggerFlash() {
      screenFlash = 0.18;
    }

    function spawnAttack() {
      _spawnSingleArrow();
    }

    function getArrowTravelTime() {
      if (cutCount > COUNT_FAST_THRESHOLD) {
        return ARROW_TRAVEL_MIN + Math.random() * (ARROW_TRAVEL_FAST_MAX - ARROW_TRAVEL_MIN);
      }

      const d = getEffectiveDifficulty();
      const progress = (d - 1) / (DIFFICULTY_MAX - 1);
      const baseTime = ARROW_TRAVEL_MAX - progress * (ARROW_TRAVEL_MAX - ARROW_TRAVEL_MIN);
      const variance = 0.88 + Math.random() * 0.24;
      return Math.max(ARROW_TRAVEL_MIN, Math.min(ARROW_TRAVEL_MAX, baseTime * variance));
    }

    function getArrowFlightVector(atk) {
      const dx = atk.targetX - atk.startX;
      const dy = atk.targetY - atk.startY;
      const dist = Math.hypot(dx, dy) || 1;
      const speed = dist / atk.travelTime;
      return { vx: (dx / dist) * speed, vy: (dy / dist) * speed };
    }

    function getArrowPosition(atk, elapsed) {
      const t = Math.min(1, elapsed / atk.travelTime);
      return {
        x: atk.startX + (atk.targetX - atk.startX) * t,
        y: atk.startY + (atk.targetY - atk.startY) * t
      };
    }

    function _spawnSingleArrow() {
      const edge = Math.floor(Math.random() * 3);
      let x, y;
      const margin = s(30);

      if (edge === 0) {
        x = margin + Math.random() * (W - margin * 2);
        y = -margin;
      } else if (edge === 1) {
        x = -margin;
        y = margin + Math.random() * (H * 0.55);
      } else {
        x = W + margin;
        y = margin + Math.random() * (H * 0.55);
      }

      const cc = getCombatCenter();
      const dx = cc.x - x;
      const dy = cc.y - y;
      const travelTime = getArrowTravelTime();

      attacks.push({
        startX: x,
        startY: y,
        targetX: cc.x,
        targetY: cc.y,
        travelTime,
        elapsed: 0,
        x,
        y,
        angle: Math.atan2(dy, dx),
        length: s(88),
        thickness: s(8),
        alive: true,
        parried: false
      });
    }

    function isInParryArc(ax, ay) {
      const cc = getCombatCenter();
      const angle = Math.atan2(ay - cc.y, ax - cc.x);
      return angle >= -Math.PI && angle <= 0;
    }

    function isInParryZone(ax, ay) {
      const cc = getCombatCenter();
      const dist = Math.hypot(ax - cc.x, ay - cc.y);
      const parryRadius = getParryRadius();
      return dist <= parryRadius && dist > getBodyHitRadius() && isInParryArc(ax, ay);
    }

    function canParryAttack(atk, dt) {
      if (isInParryZone(atk.x, atk.y)) return true;

      const cc = getCombatCenter();
      const prevPos = getArrowPosition(atk, Math.max(0, atk.elapsed - dt));
      const prevDist = Math.hypot(prevPos.x - cc.x, prevPos.y - cc.y);
      const dist = Math.hypot(atk.x - cc.x, atk.y - cc.y);
      const parryRadius = getParryRadius();

      if (prevDist > parryRadius && dist <= parryRadius && dist > getBodyHitRadius() && isInParryArc(atk.x, atk.y)) {
        return true;
      }
      return false;
    }

    function spawnSparkParticles(x, y, baseAngle) {
      const count = 5;
      for (let i = 0; i < count; i++) {
        const spread = (Math.random() - 0.5) * Math.PI * 0.8;
        const a = baseAngle + spread;
        const speed = 80 + Math.random() * 160;
        particles.push({
          x, y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          life: 0.25 + Math.random() * 0.25,
          maxLife: 0,
          size: 2
        });
        particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
      }
    }

    function spawnBrokenStick(atk) {
      const perpX = -Math.sin(atk.angle);
      const perpY = Math.cos(atk.angle);
      const fwdX = Math.cos(atk.angle);
      const fwdY = Math.sin(atk.angle);

      const specs = [
        { offset: -0.12, len: 0.42, ang: 0.55, px: 140, py: 60, spin: 4.5 },
        { offset: 0.08, len: 0.48, ang: -0.65, px: -120, py: 80, spin: -5 }
      ];

      for (const spec of specs) {
        const flight = getArrowFlightVector(atk);
        brokenSticks.push({
          x: atk.x + fwdX * atk.length * spec.offset,
          y: atk.y + fwdY * atk.length * spec.offset,
          angle: atk.angle + spec.ang,
          length: atk.length * spec.len,
          thickness: atk.thickness,
          vx: flight.vx * 0.12 + perpX * s(spec.px) + fwdX * s(30),
          vy: flight.vy * 0.12 + perpY * s(spec.py) + fwdY * s(30),
          spin: spec.spin,
          life: 0.22,
          maxLife: 0.22
        });
      }
    }

    function pickSlashPatternFromSource(vx, vy) {
      const fromAngle = Math.atan2(-vy, -vx);
      const deg = ((fromAngle * 180 / Math.PI) + 360) % 360;

      if (deg >= 225 && deg < 315) {
        return 'down';
      } else if (deg >= 135 && deg < 225) {
        return 'diag_L';
      } else if (deg >= 315 || deg < 45) {
        return 'diag_R';
      } else {
        return 'horiz';
      }
    }

    function pickRandomSlashPattern() {
      const patterns = ['down', 'diag_L', 'diag_R', 'horiz'];
      return patterns[Math.floor(Math.random() * patterns.length)];
    }

    function spawnSlash(pattern) {
      const cfg = SLASH_VISUAL[pattern] || SLASH_VISUAL.horiz;
      const cc = getCombatCenter();
      slashes.push({
        x: cc.x, y: cc.y,
        angle: cfg.angle,
        len: getParryRadius() * 0.85,
        t: 0, dur: 0.14
      });
    }

    function perfectParry(attack) {
      spawnBrokenStick(attack);
      attack.alive = false;
      attack.parried = true;
      cutCount++;
      currentCount++;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      bumpComboVisual();
      triggerFlash();
      spawnSparkParticles(attack.x, attack.y, attack.angle + Math.PI);
      stamina = Math.min(MAX_STAMINA, stamina + STAMINA_SWING_COST);
      updateHUD();
      difficulty = Math.min(DIFFICULTY_MAX, difficulty + getComboDiffBonus());
    }

    function takeHit() {
      combo = 0;
      comboPop = 0;
      charState = 'hit';
      charShakeTimer = 0.32;
      hp = Math.max(0, hp - HIT_DAMAGE);
      updateHUD();
      if (hp <= 0) {
        gameOver = true;
        showGameOverPanel();
      }
    }

    function tryParry() {
      if (gameState !== GameState.PLAYING) return;
      if (gameOver || !running) return;
      if (stamina < STAMINA_SWING_COST) return;

      stamina -= STAMINA_SWING_COST;
      updateHUD();
      parryActive = true;
      parryTimer = getParryWindow();

      const nearestAttack = attacks
        .filter(a => a.alive)
        .sort((a, b) =>
          Math.hypot(a.x - player.x, a.y - player.y) -
          Math.hypot(b.x - player.x, b.y - player.y)
        )[0];

      const slashPattern = nearestAttack
        ? (() => {
            const flight = getArrowFlightVector(nearestAttack);
            return pickSlashPatternFromSource(flight.vx, flight.vy);
          })()
        : pickRandomSlashPattern();

      charPattern = slashPattern;
      charState = 'draw';
      charTimer = 0.06;
      spawnSlash(slashPattern);

      for (const atk of attacks) {
        if (!atk.alive) continue;
        if (isInParryZone(atk.x, atk.y)) {
          perfectParry(atk);
        }
      }
    }

    function updateAttacks(dt) {
      for (const atk of attacks) {
        if (!atk.alive) continue;

        atk.elapsed += dt;
        const pos = getArrowPosition(atk, atk.elapsed);
        atk.x = pos.x;
        atk.y = pos.y;

        const cc = getCombatCenter();
        const dist = Math.hypot(atk.x - cc.x, atk.y - cc.y);

        if (parryActive && canParryAttack(atk, dt)) {
          perfectParry(atk);
          continue;
        }

        if (dist <= getBodyHitRadius()) {
          atk.alive = false;
          takeHit();
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateBrokenSticks(dt) {
      for (let i = brokenSticks.length - 1; i >= 0; i--) {
        const b = brokenSticks[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.angle += b.spin * dt;
        b.vx *= 0.92;
        b.vy *= 0.92;
        b.life -= dt;
        if (b.life <= 0) brokenSticks.splice(i, 1);
      }
    }

    function drawBrokenSticks() {
      for (const b of brokenSticks) {
        const t = b.life / b.maxLife;
        ctx.save();
        ctx.globalAlpha = t;
        ctx.translate(b.x, b.y);
        ctx.rotate(b.angle);
        ctx.strokeStyle = '#111';
        ctx.lineWidth = b.thickness;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-b.length * 0.5, 0);
        ctx.lineTo(b.length * 0.5, 0);
        ctx.stroke();
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function updateSlashes(dt) {
      for (let i = slashes.length - 1; i >= 0; i--) {
        slashes[i].t += dt;
        if (slashes[i].t >= slashes[i].dur) slashes.splice(i, 1);
      }
    }

    function drawSlashes() {
      for (const s of slashes) {
        const p = Math.min(1, s.t / s.dur);
        const ease = 1 - Math.pow(1 - p, 3);
        const fade = 1 - p * p;
        const len = s.len * ease;
        const cos = Math.cos(s.angle);
        const sin = Math.sin(s.angle);

        ctx.save();
        ctx.globalAlpha = fade * 0.7;
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + cos * len, s.y + sin * len);
        ctx.stroke();
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function drawParryZone() {
      if (gameTime >= GUIDE_SHOW_TIME) return;

      const cc = getCombatCenter();
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cc.x, cc.y, getParryRadius(), Math.PI, 0, false);
      ctx.stroke();
    }

    function drawBackground() {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);
    }

    function drawPlayer() {
      const rect = getCharDrawRect();
      const nw = rect.img && (rect.img.naturalWidth || rect.img.width);
      const nh = rect.img && (rect.img.naturalHeight || rect.img.height);
      if (rect.img && nw && nh) {
        ctx.drawImage(rect.img, rect.x, rect.y, rect.w, rect.h);
      } else {
        drawPlayerFallbackDot();
      }
    }

    function drawAttack(atk) {
      ctx.save();
      ctx.translate(atk.x, atk.y);
      ctx.rotate(atk.angle);

      ctx.strokeStyle = difficulty >= 3 ? '#333' : '#111';
      ctx.setLineDash([]);

      ctx.lineWidth = atk.thickness * 0.55;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-atk.length * 0.55, 0);
      ctx.lineTo(atk.length * 0.45, 0);
      ctx.stroke();

      ctx.lineWidth = atk.thickness;
      ctx.beginPath();
      ctx.moveTo(atk.length * 0.18, 0);
      ctx.lineTo(atk.length * 0.45, 0);
      ctx.stroke();

      ctx.lineWidth = atk.thickness * 0.7;
      ctx.beginPath();
      ctx.moveTo(atk.length * 0.45, 0);
      ctx.lineTo(atk.length * 0.22, -atk.thickness * 1.4);
      ctx.moveTo(atk.length * 0.45, 0);
      ctx.lineTo(atk.length * 0.22,  atk.thickness * 1.4);
      ctx.stroke();

      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawParticles() {
      ctx.fillStyle = '#111';
      for (const p of particles) {
        const t = p.life / p.maxLife;
        ctx.globalAlpha = t;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawScreenFlash() {
      if (screenFlash > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${screenFlash * 0.08})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function update(dt) {
      if (gameState !== GameState.PLAYING) return;
      if (gameOver) return;

      gameTime += dt;

      const timeDiffRate = combo >= COMBO_SOFT_CAP ? 0.006 : 0.012;
      difficulty = Math.min(DIFFICULTY_MAX, difficulty + dt * timeDiffRate);

      if (parryTimer > 0) {
        parryTimer -= dt;
        if (parryTimer <= 0) parryActive = false;
      }

      if (screenFlash > 0) screenFlash -= dt;

      if (comboPop > 0) comboPop = Math.max(0, comboPop - dt / COMBO_POP_DURATION);

      if (charTimer > 0) charTimer -= dt;

      if (charState === 'draw' && charTimer <= 0) {
        charState = 'slash';
        charTimer = (charPattern === 'down') ? 0.12 : 0.0;
      }
      if (charState === 'slash' && charTimer <= 0) {
        charState = 'impact';
        charTimer = 0.14;
      }
      if (charState === 'impact' && charTimer <= 0) {
        charState = 'return';
        charReturnTimer = 0.10;
      }
      if (charState === 'return') {
        charReturnTimer -= dt;
        if (charReturnTimer <= 0) charState = 'idle';
      }
      if (charShakeTimer > 0) charShakeTimer -= dt;
      if (charState === 'hit' && charShakeTimer <= 0) charState = 'idle';

      if (stamina < MAX_STAMINA) {
        staminaRegenTimer += dt;
        while (staminaRegenTimer >= STAMINA_REGEN_INTERVAL) {
          staminaRegenTimer -= STAMINA_REGEN_INTERVAL;
          if (stamina < MAX_STAMINA) {
            stamina = Math.min(MAX_STAMINA, stamina + STAMINA_REGEN_AMOUNT);
            updateHUD();
          }
        }
      } else {
        staminaRegenTimer = 0;
      }

      if (gameTime >= ATTACKS_START_TIME) {
        spawnTimer += dt;
        if (spawnTimer >= spawnInterval) {
          spawnTimer = 0;
          spawnAttack();
          scheduleNextSpawn();
        }
      }

      updateAttacks(dt);
      updateParticles(dt);
      updateBrokenSticks(dt);
      updateSlashes(dt);

      for (let i = attacks.length - 1; i >= 0; i--) {
        if (!attacks[i].alive) attacks.splice(i, 1);
      }
    }

    function draw() {
      drawBackground();
      if (gameState !== GameState.PLAYING) return;

      drawParryZone();
      drawBrokenSticks();
      drawPlayer();
      drawCombo();

      for (const atk of attacks) {
        if (atk.alive) drawAttack(atk);
      }

      drawSlashes();
      drawParticles();
      drawScreenFlash();
    }

    function loop(timestamp) {
      if (!running) return;
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (gameState !== GameState.PLAYING) return;
      if (gameOver) return;
      tryParry();
    });

    function shouldIgnoreGameTap(target) {
      return target && target.closest('button, input, textarea, a, .ranking-table, .menu-btn, .game-over-btn');
    }

    function handleGameTap(e) {
      if (shouldIgnoreGameTap(e.target)) return;
      if (isCoarseMobile() && isPortraitViewport()) return;
      if (gameState !== GameState.PLAYING) return;
      if (gameOver) return;
      e.preventDefault();
      tryParry();
    }

    if (gameStageEl) {
      gameStageEl.addEventListener('touchstart', handleGameTap, { passive: false });
    }

    window.addEventListener('keydown', (e) => {
      if (e.code !== 'Space') return;
      if (gameState !== GameState.PLAYING) return;
      if (gameOver) return;
      e.preventDefault();
      if (e.repeat) return;
      tryParry();
    });

    btnStart.addEventListener('click', (e) => {
      e.stopPropagation();
      startGame();
    });

    btnRetry.addEventListener('click', (e) => {
      e.stopPropagation();
      startGame();
    });

    btnGotoRank.addEventListener('click', (e) => {
      e.stopPropagation();
      showRankingScreen();
    });

    btnHome.addEventListener('click', (e) => {
      e.stopPropagation();
      hideGameOverPanel();
      gameOver = false;
      setGameState(GameState.MAIN_MENU);
    });

    rankingPaginationEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.ranking-page-btn');
      if (!btn) return;
      rankingPage = Number(btn.dataset.page);
      renderRankingTablePage();
      renderRankingPagination();
    });

    btnRankingBack.addEventListener('click', () => {
      hideRankingScreen();
    });

    btnSubmitScore.addEventListener('click', () => {
      const nickname = nicknameInput.value.trim();
      if (!nickname) {
        nicknameInput.focus();
        return;
      }
      if (scoreSubmitted) return;
      submitScore(nickname);
    });

    btnRank.addEventListener('click', (e) => {
      e.stopPropagation();
      showRankingScreen();
    });

    gameOverEl.addEventListener('click', (e) => {
      if (e.target === gameOverEl) e.stopPropagation();
    });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', resize);
    }
    loadCharImages();
    setGameState(GameState.MAIN_MENU);
    resize();
    running = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
